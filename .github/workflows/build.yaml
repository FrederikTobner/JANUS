name: Build

on:
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: ${{ matrix.arch }}-${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build-env
        with:
          arch: ${{ matrix.arch }}

      - uses: ./.github/actions/setup-compiler
        with:
          arch: ${{ matrix.arch }}
          compiler: ${{ matrix.compiler }}

      - name: Configure
        run: cmake --preset ${{ matrix.arch }}-${{ matrix.compiler }} -D CMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build --preset ${{ matrix.arch }}-${{ matrix.compiler }}

      - name: Build ISOs
        run: cmake --build --preset ${{ matrix.arch }}-${{ matrix.compiler }} --target iso

      - uses: ./.github/actions/setup-analysis-tools
        if: matrix.compiler == 'clang'

      - name: Check formatting
        if: matrix.compiler == 'clang'
        run: find kernel -name '*.c' -o -name '*.h' | xargs clang-format-18 --dry-run --Werror

      - name: Static analysis (clang-tidy)
        if: matrix.compiler == 'clang'
        run: |
          jq -r '.[].file' build-${{matrix.arch}}-clang/compile_commands.json \
            | grep 'kernel/.*\.c$' \
            | xargs clang-tidy -p build-${{matrix.arch}}-clang

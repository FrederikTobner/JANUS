name: Doxygen

on:
  push:
    branches: ["main", "master"]
    paths:
      - "kernel/**"
      - "tools/**"
      - "Doxyfile"
      - ".github/workflows/doxygen.yaml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "kernel/**"
      - "tools/**"
      - "Doxyfile"
      - ".github/workflows/doxygen.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate API docs
        run: doxygen Doxyfile

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: doxygen-out/html
          retention-days: 30

  # Publish Doxygen API docs to GitHub Pages at /JANUS/.
  # Runs only on pushes to main so PRs never overwrite the live site.
  publish:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate API docs
        run: doxygen Doxyfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doxygen-out/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

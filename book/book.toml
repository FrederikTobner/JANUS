[book]
title = "Building TinyOS: A Journey in Operating System Development"
authors = ["Frederik Tobner"]
language = "en"
src = "src"
description = "A hands-on guide to building a minimal operating system from scratch"

[build]
build-dir = "build"
create-missing = true

[preprocessor.side-notes]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/yourusername/TinyOS"
edit-url-template = "https://github.com/yourusername/TinyOS/edit/main/book/{path}"
site-url = "/TinyOS/"
cname = ""
additional-css = ["theme/side-notes.css"]
mathjax-support = true
additional-js = ["additional-js/mermaid/mermaid.min.js", "additional-js/mermaid/mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
